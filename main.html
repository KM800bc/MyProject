<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>iPhone 팝업</title>
  <link rel="stylesheet" href="css/gsap.css" />
  
</head>
<body>
 <section class="hero">
    <div class="hero-content">
      <h1>iPhone</h1>
      <p>Everything you need to know about iPhone</p>
      <button id="openPopup" class="hero-btn">Get to know iPhone</button>
    </div>
    <div class="hero-image">
      <img src="iphone.png" alt="iPhone Image">
    </div>
  </section>

  <!-- 팝업 -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <span id="closePopup" class="close">&times;</span>
      <h2>iPhone 소개</h2>
      <p>애플 스타일의 부드러운 팝업입니다.</p>
      <div class="popup-inner">
        <div class="feature">Display & Design</div>
        <div class="feature">Performance</div>
        <div class="feature">Camera & Photos</div>
        <div class="feature">Battery & Charging</div>
      </div>
    </div>
  </div>
  
<!-- GSAP + ScrollTrigger CDN -->
  <script src="js/gsap.min.js"></script>
  <script src="js/ScrollTrigger.min.js"></script>
  <script src="js/script.js"></script>
  
</body>
</html>
