<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>iPhone 팝업</title>
  <link rel="stylesheet" href="css/gsap.css" />
  
</head>
<body>
<h1 class="title">Get to know iPhonesdfsdfsdfsdfsdf</h1>

<div class="slider-wrapper">

  <button class="arrow left">←</button>

  <div class="slider">
    <div class="track">

      <div class="card" data-index="0">Camera</div>
      <div class="card" data-index="1">Display</div>
      <div class="card" data-index="2">Chip</div>
      <div class="card" data-index="3">Battery</div>
      <div class="card" data-index="4">iOS</div>
      <div class="card" data-index="5">Privacy</div>
      <div class="card" data-index="6">Safety</div>
      <div class="card" data-index="7">5G</div>

    </div>
  </div>

  <button class="arrow right">→</button>

</div>

<!-- 팝업 -->
<div id="popup">
  <div class="popup-box">

    <button id="close">✕</button>

    <div class="popup-content" data-index="0">
      <h2>Camera</h2>
      <p>카메라 상세 설명</p>
    </div>
    <div class="popup-content" data-index="1">
      <h2>Display</h2>
      <p>디스플레이 설명</p>
    </div>
    <div class="popup-content" data-index="2">
      <h2>Chip</h2>
      <p>칩 성능 설명</p>
    </div>
    <div class="popup-content" data-index="3">
      <h2>Battery</h2>
      <p>배터리 설명</p>
    </div>
    <div class="popup-content" data-index="4">
      <h2>iOS</h2>
      <p>iOS 설명</p>
    </div>
    <div class="popup-content" data-index="5">
      <h2>Privacy</h2>
      <p>보안 설명</p>
    </div>
    <div class="popup-content" data-index="6">
      <h2>Safety</h2>
      <p>안전 기능 설명</p>
    </div>
    <div class="popup-content" data-index="7">
      <h2>5G</h2>
      <p>5G 설명</p>
    </div>

  </div>
</div>
  
<!-- GSAP + ScrollTrigger CDN -->
  <script src="js/gsap.min.js"></script>
  <script src="js/ScrollTrigger.min.js"></script>
  <script src="js/script.js"></script>
  
</body>
</html>
