<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Apple iPhone Slider</title>
<link rel="stylesheet" href="css/gsap.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
</head>
<body>


<h1 class="title">Get to know iPhone</h1>

<div class="slider-wrapper">
  <div class="slider">
    <div class="track">

      <div class="card" data-index="0"><img src="camera.jpg" alt="Camera"></div>
      <div class="card" data-index="1"><img src="display.jpg" alt="Display"></div>
      <div class="card" data-index="2"><img src="chip.jpg" alt="Chip"></div>
      <div class="card" data-index="3"><img src="battery.jpg" alt="Battery"></div>
      <div class="card" data-index="4"><img src="ios.jpg" alt="iOS"></div>
      <div class="card" data-index="5"><img src="privacy.jpg" alt="Privacy"></div>
      <div class="card" data-index="6"><img src="safety.jpg" alt="Safety"></div>
      <div class="card" data-index="7"><img src="5g.jpg" alt="5G"></div>

    </div>
  </div>
  <div>
	<button class="arrow left">←</button>
	<button class="arrow right">→</button>
	</div>

</div>

<!-- 팝업 -->
<div id="popup">
  <div class="popup-box">

    <button id="close">✕</button>

    <div class="popup-content" data-index="0">
      <h2>Camera</h2>
      <p>카메라 상세 설명</p>
    </div>
    <div class="popup-content" data-index="1">
      <h2>Display</h2>
      <p>디스플레이 설명</p>
    </div>
    <div class="popup-content" data-index="2">
      <h2>Chip</h2>
      <p>칩 성능 설명</p>
    </div>
    <div class="popup-content" data-index="3">
      <h2>Battery</h2>
      <p>배터리 설명</p>
    </div>
    <div class="popup-content" data-index="4">
      <h2>iOS</h2>
      <p>iOS 설명</p>
    </div>
    <div class="popup-content" data-index="5">
      <h2>Privacy</h2>
      <p>보안 설명</p>
    </div>
    <div class="popup-content" data-index="6">
      <h2>Safety</h2>
      <p>안전 기능 설명</p>
    </div>
    <div class="popup-content" data-index="7">
      <h2>5G</h2>
      <p>5G 설명</p>
    </div>

  </div>
</div>


<script src="js/script.js"></script>
</body>
</html>
