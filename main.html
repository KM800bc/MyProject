<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Final Apple Slider</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #f5f5f7;
}

.title {
  text-align: center;
  margin: 40px 0;
}

/* 슬라이더 */
.slider-wrapper {
  position: relative;
  width: 1320px; /* 6개 */
  margin: auto;
}

.slider {
  overflow: hidden;
}

.track {
  display: flex;
  gap: 20px;
  transition: transform 0.4s ease;
}

/* 카드 */
.card {
  width: 200px;
  height: 120px;
  flex-shrink: 0;
  background: #fff;
  border-radius: 20px;

  display: flex;
  justify-content: center;
  align-items: center;

  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* 화살표 */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #fff;
  cursor: pointer;
  z-index: 10;
}

.left { left: -60px; }
.right { right: -60px; }

/* 팝업 */
#popup {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);

  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  width: 400px;
  position: relative;
  box-shadow: 0 30px 60px rgba(0,0,0,0.4);
}

.popup-content {
  display: none;
}

.popup-content.active {
  display: block;
}

#close {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1 class="title">Get to know iPhone</h1>

<div class="slider-wrapper">

  <button class="arrow left">←</button>

  <div class="slider">
    <div class="track">

      <div class="card" data-index="0">1</div>
      <div class="card" data-index="1">2</div>
      <div class="card" data-index="2">3</div>
      <div class="card" data-index="3">4</div>
      <div class="card" data-index="4">5</div>
      <div class="card" data-index="5">6</div>
      <div class="card" data-index="6">7</div>
      <div class="card" data-index="7">8</div>

    </div>
  </div>

  <button class="arrow right">→</button>

</div>

<!-- 팝업 -->
<div id="popup">
  <div class="popup-box">

    <button id="close">✕</button>

    <div class="popup-content" data-index="0"><h2>1</h2><p>내용1</p></div>
    <div class="popup-content" data-index="1"><h2>2</h2><p>내용2</p></div>
    <div class="popup-content" data-index="2"><h2>3</h2><p>내용3</p></div>
    <div class="popup-content" data-index="3"><h2>4</h2><p>내용4</p></div>
    <div class="popup-content" data-index="4"><h2>5</h2><p>내용5</p></div>
    <div class="popup-content" data-index="5"><h2>6</h2><p>내용6</p></div>
    <div class="popup-content" data-index="6"><h2>7</h2><p>내용7</p></div>
    <div class="popup-content" data-index="7"><h2>8</h2><p>내용8</p></div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const track = document.querySelector(".track");
  const cards = document.querySelectorAll(".card");

  const prev = document.querySelector(".left");
  const next = document.querySelector(".right");

  const popup = document.getElementById("popup");
  const contents = document.querySelectorAll(".popup-content");
  const closeBtn = document.getElementById("close");

  let current = 0;

  const cardWidth = 220;
  const visible = 6;
  const max = cards.length - visible;

  /* 👉 오른쪽 */
  next.addEventListener("click", function(){
    if(current < max){
      current++;
      track.style.transform = "translateX(-" + (current * cardWidth) + "px)";
    }
  });

  /* 👉 왼쪽 */
  prev.addEventListener("click", function(){
    if(current > 0){
      current--;
      track.style.transform = "translateX(-" + (current * cardWidth) + "px)";
    }
  });

  /* 👉 카드 클릭 */
  cards.forEach(function(card){
    card.addEventListener("click", function(){
      const index = this.getAttribute("data-index");

      contents.forEach(function(c){
        c.classList.remove("active");
      });

      document.querySelector('.popup-content[data-index="'+index+'"]')
        .classList.add("active");

      popup.style.display = "flex";
    });
  });

  /* 👉 닫기 */
  closeBtn.addEventListener("click", function(){
    popup.style.display = "none";
  });

});
</script>

</body>
</html>
