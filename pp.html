<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GSAP Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  background: #0e0e0e;
  color: #fff;
  overflow-x: hidden;
}

/* 커서 */
.cursor {
  position: fixed;
  width: 80px;
  height: 80px;
  background: white;
  color: black;
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  transform: translate(-50%, -50%);
  z-index:9999;
  font-size:12px;
  font-weight:bold;
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  align-items:center;
  padding: 0 10%;
}

.title span {
  display:block;
  overflow:hidden;
  font-size:80px;
  line-height:1.1;
}

/* PROJECT */
.projects {
  padding: 100px 10%;
  display:flex;
  gap:40px;
}

.card {
  position:relative;
  width:300px;
  height:400px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  inset:0;
  background:#fff;
  transform: scaleY(0);
  transform-origin:bottom;
}

.card h2 {
  position:absolute;
  bottom:20px;
  left:20px;
  z-index:2;
}

/* ABOUT */
.about {
  padding:200px 10%;
}

.about h2 {
  font-size:40px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="cursor">VIEW</div>

<!-- HERO -->
<section class="hero">
  <h1 class="title">
    <span>Creative</span>
    <span>Frontend</span>
    <span>Developer</span>
  </h1>
</section>

<!-- PROJECT -->
<section class="projects">

  <div class="card">
    <img src="https://picsum.photos/500/400?1">
    <div class="overlay"></div>
    <h2>Project One</h2>
  </div>

  <div class="card">
    <img src="https://picsum.photos/500/400?2">
    <div class="overlay"></div>
    <h2>Project Two</h2>
  </div>

</section>

<!-- ABOUT -->
<section class="about">
  <h2>About Me</h2>
  <p>GSAP 기반 인터랙션 포트폴리오 테스트 페이지입니다.</p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

//////////////////////////////
// 커서 따라다니기
//////////////////////////////
const cursor = document.querySelector(".cursor");

window.addEventListener("mousemove", (e) => {
  gsap.to(cursor, {
    x: e.clientX,
    y: e.clientY,
    duration: 0.4,
    ease: "power3.out"
  });
});

//////////////////////////////
// HERO 텍스트
//////////////////////////////
gsap.from(".title span", {
  y: 120,
  stagger: 0.1,
  duration: 1,
  ease: "power4.out"
});

//////////////////////////////
// 카드 hover
//////////////////////////////
document.querySelectorAll(".card").forEach(card => {
  const overlay = card.querySelector(".overlay");

  let tl = gsap.timeline({ paused: true });

  tl.to(overlay, {
    scaleY: 1,
    duration: 0.4,
    ease: "power3.out"
  });

  card.addEventListener("mouseenter", () => {
    tl.play();

    gsap.to(cursor, {
      scale: 1.5
    });
  });

  card.addEventListener("mouseleave", () => {
    tl.reverse();

    gsap.to(cursor, {
      scale: 1
    });
  });
});

//////////////////////////////
// 스크롤 애니메이션
//////////////////////////////
gsap.from(".card", {
  y: 100,
  opacity: 0,
  stagger: 0.2,
  scrollTrigger: {
    trigger: ".projects",
    start: "top 80%"
  }
});

//////////////////////////////
// ABOUT 애니메이션
//////////////////////////////
let tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".about",
    start: "top 70%"
  }
});

tl.from(".about h2", {
  y: 100,
  opacity: 0
})
.from(".about p", {
  y: 50,
  opacity: 0
}, "-=0.3");

</script>

</body>
</html>
