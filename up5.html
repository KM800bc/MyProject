<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Animation Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
.Horizontal {
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
}

.Horizontal__text {
  display: flex;
  width: max-content;
  white-space: nowrap;
  gap: 4vw;
  padding-left: 100vw;
}

.heading-xl {
  font-size: clamp(2rem, 10vw, 12rem);
  font-weight: 600;
  line-height: 1.1;
}

</style>
</head>
<body>

<section class="Horizontal">
  <div class="container">
    <h3 class="Horizontal__text heading-xl">
      The containerAnimation property allows us to create ScrollTriggered animations within a container that's animated horizontally. It's like having nested ScrollTriggers!
    </h3>
  </div>
</section>

<div class="arch">
  <div class="arch__right">
    <div class="img-wrapper" data-index="1">
      <img src="https://ik.imagekit.io/kg2nszxjp/GSAP%20pinned%20image%20mask%20reveal%20on%20scroll/cu8978xjlsjjpjk52ta0.webp" alt="Green Architecture">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/split-type@0.3.3/umd/index.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("DOMContentLoaded", () => {

  // 1️⃣ 텍스트 쪼개기
  const textEl = document.querySelector('.Horizontal__text');
  const split = new SplitType(textEl, { types: 'chars' });
  const chars = split.chars;

  // 2️⃣ 메인 타임라인 (텍스트 + 이미지 동시 애니메이션)
  const mainTimeline = gsap.timeline({
    scrollTrigger: {
      trigger: ".arch",
      start: "top top",
      end: "+=1000", // 스크롤 길이 조정
      scrub: true,
      pin: ".arch__right"
    }
  });

  // 텍스트 흩어졌다가 돌아오기
  mainTimeline.from(chars, {
    yPercent: () => gsap.utils.random(-200, 200),
    xPercent: () => gsap.utils.random(-100, 100),
    rotation: () => gsap.utils.random(-30, 30),
    opacity: 0,
    stagger: {
      each: 0.02,
      from: "random"
    },
    ease: "back.out(1.7)"
  }, 0); // 0 = 타임라인 시작점

  // 이미지 올라오는 애니메이션
  mainTimeline.from(".img-wrapper img", {
    y: 200,
    opacity: 0,
    duration: 1.5,
    ease: "power2.out"
  }, 0); // 텍스트와 동시에 시작

});
</script>

</body>
</html>
