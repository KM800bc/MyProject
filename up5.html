<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Animation Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
  body {
    font-family: sans-serif;
    margin: 0;
    padding: 0;
    height: 200vh; /* 스크롤을 위해 충분한 높이 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
  }
  .Horizontal {
    margin-top: 150px;
    font-size: 2rem;
    text-align: center;
  }
  .Horizontal span {
    display: inline-block;
  }
</style>
</head>
<body>

<section class="Horizontal">
  The containerAnimation property allows us to create ScrollTriggered animations!
</section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  const textEl = document.querySelector('.Horizontal');
  const text = textEl.innerText;
  const chars = text.split('');

  // 텍스트를 span으로 분할
  textEl.innerHTML = chars.map(char => char === " " ? "&nbsp;" : `<span>${char}</span>`).join('');
  const spans = textEl.querySelectorAll('span');

  // 애니메이션
  gsap.from(spans, {
    y: 100,           // 아래서 위로 등장
    opacity: 0,
    rotation: () => gsap.utils.random(-15, 15),
    stagger: 0.05,
    duration: 0.8,
    ease: "back.out(1.2)",
    scrollTrigger: {
      trigger: ".Horizontal",
      start: "top 80%", // 화면 아래 80%에 도달하면 시작
      end: "top 50%",   // 화면 중간까지
      toggleActions: "play none none none", // 한 번만 재생
      markers: true      // 위치 확인용
    }
  });
</script>

</body>
</html>
