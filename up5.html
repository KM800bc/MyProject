<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body { margin:0; }

.arch {
  display: flex;
  min-height: 300vh;
}

.arch__left {
  width: 50%;
}

.arch__info {
  height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.arch__right {
  width: 50%;
  height: 100vh;
  position: relative;
}

.img-wrapper {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.img-wrapper img {
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="arch">
  <div class="arch__left">
    <div class="arch__info">텍스트1</div>
    <div class="arch__info">텍스트2</div>
    <div class="arch__info">텍스트3</div>
  </div>

  <div class="arch__right">
    <div class="img-wrapper" style="z-index:3">
      <img src="https://picsum.photos/800/600?1">
    </div>
    <div class="img-wrapper" style="z-index:2">
      <img src="https://picsum.photos/800/600?2">
    </div>
    <div class="img-wrapper" style="z-index:1">
      <img src="https://picsum.photos/800/600?3">
    </div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

const imgs = gsap.utils.toArray(".img-wrapper img");

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".arch",
    start: "top top",
    end: "+=2000",
    scrub: true,
    pin: ".arch__right"
  }
});

imgs.forEach((img, i) => {
  if (imgs[i+1]) {
    tl.to(img, {
      clipPath: "inset(0 0 100% 0)",
      duration: 1
    });
  }
});
</script>

</body>
</html>
