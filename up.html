<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>GSAP Portfolio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: #111;
      color: #fff;
      overflow-x: hidden;
    }

    section {
      padding: 100px 10%;
    }

    /* 커서 */
    .cursor {
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* 메인 텍스트 */
    .hero h1 span {
      display: block;
      overflow: hidden;
      font-size: 80px;
    }

    /* 카드 */
    .projects {
      display: flex;
      gap: 40px;
    }

    .card {
      width: 300px;
      height: 200px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: black;
      transform: scaleY(0);
      transform-origin: bottom;
    }

    .card h2 {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 2;
    }

    /* 섹션 */
    .section {
      margin-top: 200px;
    }
  </style>
</head>
<body>

<div class="cursor"></div>

<section class="hero">
  <h1>
    <span>Creative</span>
    <span>Developer</span>
  </h1>
</section>

<section class="projects">
  <div class="card">
    <img src="https://picsum.photos/400/300?1" />
    <div class="overlay"></div>
    <h2>Project 1</h2>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/300?2" />
    <div class="overlay"></div>
    <h2>Project 2</h2>
  </div>
</section>

<section class="section">
  <h2 class="title">About Me</h2>
  <p class="desc">Frontend Developer using GSAP animations.</p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

//////////////////////////////////
// 1. 커서
//////////////////////////////////
const cursor = document.querySelector(".cursor");

window.addEventListener("mousemove", (e) => {
  gsap.to(cursor, {
    x: e.clientX,
    y: e.clientY,
    duration: 0.3,
    ease: "power3.out"
  });
});

//////////////////////////////////
// 2. 메인 텍스트 애니메이션
//////////////////////////////////
gsap.from(".hero span", {
  y: 100,
  stagger: 0.1,
  duration: 1,
  ease: "power4.out"
});

//////////////////////////////////
// 3. 카드 hover 효과
//////////////////////////////////
document.querySelectorAll(".card").forEach(card => {
  const overlay = card.querySelector(".overlay");

  let tl = gsap.timeline({ paused: true });

  tl.to(overlay, {
    scaleY: 1,
    duration: 0.4
  });

  card.addEventListener("mouseenter", () => {
    tl.play();
    gsap.to(cursor, { scale: 3 });
  });

  card.addEventListener("mouseleave", () => {
    tl.reverse();
    gsap.to(cursor, { scale: 1 });
  });
});

//////////////////////////////////
// 4. 스크롤 애니메이션
//////////////////////////////////
gsap.from(".card", {
  y: 100,
  opacity: 0,
  stagger: 0.2,
  scrollTrigger: {
    trigger: ".projects",
    start: "top 80%"
  }
});

//////////////////////////////////
// 5. 섹션 timeline
//////////////////////////////////
let tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".section",
    start: "top 70%"
  }
});

tl.from(".title", {
  y: 100,
  opacity: 0
})
.from(".desc", {
  y: 50,
  opacity: 0
}, "-=0.3");

</script>

</body>
</html>
