<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GSAP + Three.js</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<script>
//////////////////////////////////
// 기본 Three.js 세팅
//////////////////////////////////
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

//////////////////////////////////
// 텍스처 (이미지)
//////////////////////////////////
const textureLoader = new THREE.TextureLoader();
const texture = textureLoader.load("https://picsum.photos/800/600");

//////////////////////////////////
// Shader (핵심)
//////////////////////////////////
const material = new THREE.ShaderMaterial({
  uniforms: {
    uTexture: { value: texture },
    uMouse: { value: new THREE.Vector2(0.5, 0.5) }
  },

  vertexShader: `
    varying vec2 vUv;
    uniform vec2 uMouse;

    void main() {
      vUv = uv;

      vec3 pos = position;

      float dist = distance(uv, uMouse);
      pos.z += sin(dist * 10.0) * 0.1;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,

  fragmentShader: `
    uniform sampler2D uTexture;
    varying vec2 vUv;

    void main() {
      vec4 color = texture2D(uTexture, vUv);
      gl_FragColor = color;
    }
  `
});

//////////////////////////////////
// Plane
//////////////////////////////////
const geometry = new THREE.PlaneGeometry(2, 1.5, 32, 32);
const plane = new THREE.Mesh(geometry, material);
scene.add(plane);

//////////////////////////////////
// 마우스 인터랙션 (GSAP 연결)
//////////////////////////////////
window.addEventListener("mousemove", (e) => {
  let x = e.clientX / window.innerWidth;
  let y = 1.0 - e.clientY / window.innerHeight;

  gsap.to(material.uniforms.uMouse.value, {
    x: x,
    y: y,
    duration: 0.5
  });
});

//////////////////////////////////
// 렌더 루프
//////////////////////////////////
function animate() {
  requestAnimationFrame(animate);

  plane.rotation.y += 0.002;

  renderer.render(scene, camera);
}

animate();

//////////////////////////////////
// 반응형
//////////////////////////////////
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
